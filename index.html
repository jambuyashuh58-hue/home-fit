<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>It Works – HomeFit</title>
  <style>
    :root{--navy:#0B1F3A;--blue:#1E88E5;--gray:#F3F5F7}
    *{box-sizing:border-box} html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,'Helvetica Neue',Arial;color:var(--navy);background:#fff}
    .wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
    .card{max-width:720px;width:100%;background:#fff;border-radius:16px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 20px rgba(0,0,0,.04)}
    h1{margin:0 0 8px;font-size:28px}
    p{margin:6px 0;color:#334155}
    code{background:#F1F5F9;padding:2px 6px;border-radius:6px}
    .btn{display:inline-block;margin-top:16px;padding:10px 16px;border-radius:10px;font-weight:700;background:linear-gradient(135deg,var(--blue),#1565C0);color:#fff;text-decoration:none}
    .ok{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:50%;background:#10B98120;margin-bottom:12px;font-size:28px}
    .muted{color:#64748B;font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="ok">✅</div>
      <h1>Deployment OK</h1>
      <p>This is a single-file static site served from <code>index.html</code> at the repo root.</p>
      <p class="muted">If you still see Vercel’s <strong>404: NOT_FOUND</strong> page, it means the file is not at the root, the filename is not exactly <code>index.html</code>, or the project framework settings are forcing a different output.</p>
      <a class="btn" href="#" onclick="alert('You are on the index.html page and everything is working!');return false;">Test Button</a>
    </div>
  </div>
</body>
</html>
